<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichaje</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #efede8;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6960; --text3: #9e9c94;
    --green: #2d6a4f; --green-bg: #e8f5ee;
    --red: #9b2335; --red-bg: #fceef0;
    --blue: #1a4f7a; --blue-bg: #e8f0f8;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  #app { width: 100%; max-width: 480px; }
  .screen { display: none; } .screen.active { display: block; }

  .app-header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .app-logo { width: 48px; height: 48px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.1; }
  .app-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .app-subtitle { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .header-actions { margin-left: auto; }

  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }

  .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); margin-top: 10px; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: white; border-color: var(--text); }
  .btn-primary:hover { background: #333330; }
  .btn-success { background: var(--green-bg); color: var(--green); border-color: rgba(45,106,79,0.2); font-size: 17px; padding: 16px; }
  .btn-success:hover { background: #d4eddf; }
  .btn-danger { background: var(--red-bg); color: var(--red); border-color: rgba(155,35,53,0.2); font-size: 17px; padding: 16px; }
  .btn-danger:hover { background: #f5d8dc; }
  .btn-disabled { background: var(--surface2); color: var(--text3); border-color: var(--border); font-size: 17px; padding: 16px; cursor: not-allowed; opacity: 0.4; }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 13px; margin-top: 0; }
  .btn-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2); cursor: pointer; padding: 0; margin-bottom: 1.5rem; }
  .btn-back:hover { color: var(--text); }

  .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .emp-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1rem; cursor: pointer; transition: all 0.15s; text-align: center; }
  .emp-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
  .emp-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-in { background: var(--green-bg); color: var(--green); }
  .badge-out { background: var(--red-bg); color: var(--red); }

  .pin-header { text-align: center; margin-bottom: 1.5rem; }
  .pin-avatar-large { width: 72px; height: 72px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 22px; color: var(--text2); margin: 0 auto 12px; }
  .pin-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
  .pin-hint { font-size: 13px; color: var(--text2); }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 1.5rem 0; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: var(--text); border-color: var(--text); }
  .pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 260px; margin: 0 auto; }
  .num-btn { padding: 18px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 400; background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.1s; text-align: center; }
  .num-btn:hover { background: var(--surface2); }
  .num-btn:active { transform: scale(0.95); }
  .pin-error-msg { text-align: center; font-size: 13px; color: var(--red); margin-bottom: 1rem; min-height: 20px; }

  .video-wrap { width: 100%; max-width: 300px; margin: 0 auto 1.25rem; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); background: #111; aspect-ratio: 4/3; }
  #video { width: 100%; display: block; }
  #canvas { display: none; }

  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 1rem; }
  .alert-info { background: var(--blue-bg); color: var(--blue); }

  .fich-name { font-size: 34px; font-weight: 700; letter-spacing: -1.5px; text-align: center; margin-bottom: 1rem; }
  .info-box { border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 8px; }
  .info-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .info-box-value { font-size: 20px; font-weight: 600; }
  .info-box-green { background: var(--green-bg); }
  .info-box-green .info-box-label { color: var(--green); }
  .info-box-green .info-box-value { color: var(--green); }
  .info-box-gray { background: var(--surface2); }
  .info-box-gray .info-box-label { color: var(--text2); }
  .info-box-gray .info-box-value { color: var(--text); font-size: 22px; }

  .hist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hist-table th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); }
  .hist-table td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); }
  .hist-table tr:last-child td { border-bottom: none; }

  .success-wrap { text-align: center; padding: 2rem 1rem 1rem; }
  .success-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 32px; }
  .success-icon.entrada { background: var(--green-bg); }
  .success-icon.salida { background: var(--red-bg); }
  .success-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
  .success-sub { font-size: 14px; color: var(--text2); margin-bottom: 10px; }
  .success-tiempo { font-size: 19px; font-weight: 600; color: var(--green); margin-bottom: 1rem; padding: 12px 16px; background: var(--green-bg); border-radius: var(--radius-sm); }
  .photo-thumb { width: 140px; height: 105px; object-fit: cover; border-radius: var(--radius-sm); border: 0.5px solid var(--border); margin: 0 auto 1rem; display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <div id="screen-loading" class="screen active">
    <div style="text-align:center; padding:4rem 1rem;">
      <div style="width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem;"></div>
      <p style="font-size:14px;color:var(--text2);">Cargando...</p>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <div class="app-header">
      <div class="app-logo">B&amp;S</div>
      <div>
        <div class="app-title">Fichaje</div>
        <div class="app-subtitle" id="header-date"></div>
      </div>
      <div class="header-actions">
        <button class="btn btn-sm" onclick="syncSheets()">↻</button>
      </div>
    </div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <div id="screen-pin" class="screen">
    <button class="btn-back" onclick="showScreen('screen-main')">← Volver</button>
    <div class="pin-header">
      <div class="pin-avatar-large" id="pin-avatar"></div>
      <div class="pin-name" id="pin-name"></div>
      <div class="pin-hint">Introduce tu PIN de 4 dígitos</div>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="p0"></div><div class="pin-dot" id="p1"></div>
      <div class="pin-dot" id="p2"></div><div class="pin-dot" id="p3"></div>
    </div>
    <div class="pin-error-msg" id="pin-error"></div>
    <div class="numpad">
      <button class="num-btn" onclick="addPin(1)">1</button>
      <button class="num-btn" onclick="addPin(2)">2</button>
      <button class="num-btn" onclick="addPin(3)">3</button>
      <button class="num-btn" onclick="addPin(4)">4</button>
      <button class="num-btn" onclick="addPin(5)">5</button>
      <button class="num-btn" onclick="addPin(6)">6</button>
      <button class="num-btn" onclick="addPin(7)">7</button>
      <button class="num-btn" onclick="addPin(8)">8</button>
      <button class="num-btn" onclick="addPin(9)">9</button>
      <button class="num-btn" onclick="clearPin()">C</button>
      <button class="num-btn" onclick="addPin(0)">0</button>
      <button class="num-btn" style="font-size:16px;" onclick="deletePin()">⌫</button>
    </div>
  </div>

  <div id="screen-fichar" class="screen">
    <button class="btn-back" onclick="cancelarFichaje()">← Volver</button>
    <div class="fich-name" id="fich-nombre"></div>
    <div id="fich-entrada-wrap" style="display:none; margin-bottom:1rem;">
      <div class="info-box info-box-green">
        <div class="info-box-label">Entrada</div>
        <div class="info-box-value" id="fich-entrada-val"></div>
      </div>
      <div class="info-box info-box-gray">
        <div class="info-box-label">Tiempo trabajado</div>
        <div class="info-box-value" id="fich-tiempo-val">—</div>
      </div>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>
    <div id="cam-alert" class="alert alert-info" style="display:none;"></div>
    <button id="btn-entrada" class="btn btn-success" onclick="registrarFichaje('ENTRADA')">Registrar Entrada</button>
    <button id="btn-salida" class="btn btn-danger" onclick="registrarFichaje('SALIDA')" style="margin-top:8px;">Registrar Salida</button>
    <div style="margin-top:1.5rem;">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">Últimos fichajes</div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="hist-table">
          <thead><tr><th>Tipo</th><th>Fecha</th><th>Hora</th></tr></thead>
          <tbody id="fich-history-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="screen-success" class="screen">
    <div class="success-wrap">
      <div class="success-icon entrada" id="success-icon">✓</div>
      <div class="success-title" id="success-title"></div>
      <div class="success-sub" id="success-sub"></div>
      <div class="success-tiempo" id="success-tiempo" style="display:none;"></div>
      <div id="aviso-horario" style="display:none; margin-bottom:1rem; padding:14px 18px; background:var(--red-bg); border-radius:var(--radius-sm); border:1px solid rgba(155,35,53,0.2);">
        <p style="color:var(--red); font-size:22px; font-weight:700; margin:0;">⚠️ OJO HORARIO</p>
      </div>
      <img id="success-photo" class="photo-thumb" src="" alt="" style="display:none;" />
    </div>
  </div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypMnnN4c7Wh8FQzFFrE9r_dxH2JlfhvwikBo7-iGks0KFegjEm0XAdWEymNmie4VlU/exec';
let state = { empleados:[], fichajes:{}, empleadoActual:null, pinIngresado:'', stream:null, tiempoInterval:null };

function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function updateHeaderDate() { const he=document.getElementById('header-date'); if(he) he.textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}); }
setInterval(updateHeaderDate,60000); updateHeaderDate();
function getInitials(n){return n.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();}
function primerNombre(n){return n.trim().split(/\s+/)[0];}

function fmtFecha(val) {
  if(!val) return '—';
  const s = String(val).trim();
  if(s.includes('/')) {
    const p = s.split('/');
    if(p.length===3) return `${p[0].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[2]}`;
  }
  return s;
}

function fmtHora(val) {
  if(!val) return '—';
  const s = String(val).trim();
  if(s.includes(':')) return s.substring(0,5);
  return s;
}

function parseFichajeDate(fecha, hora) {
  try {
    const f = fmtFecha(fecha);
    const h = fmtHora(hora);
    if(!f || !h || f==='—' || h==='—') return null;
    const fp = f.split('/');
    const hp = h.split(':');
    if(fp.length!==3 || hp.length<2) return null;
    const d=parseInt(fp[0]), m=parseInt(fp[1]), y=parseInt(fp[2]);
    const hh=parseInt(hp[0]), mm=parseInt(hp[1]);
    if(isNaN(d)||isNaN(m)||isNaN(y)||isNaN(hh)||isNaN(mm)) return null;
    return new Date(y, m-1, d, hh, mm, 0);
  } catch{ return null; }
}

function calcTiempo(entrada) {
  const inicio = parseFichajeDate(entrada.fecha, entrada.hora);
  if(!inicio) return null;
  const diff = Date.now() - inicio.getTime();
  if(diff<0) return null;
  const totalMin = Math.floor(diff/60000);
  const h=Math.floor(totalMin/60), m=totalMin%60;
  return {h, m, texto:`${h}h ${m}min`};
}

async function apiGet(params) {
  const res=await fetch(SCRIPT_URL+'?'+new URLSearchParams(params).toString(),{redirect:'follow'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}
async function apiPost(data) {
  const res=await fetch(SCRIPT_URL+'?action=addFichaje',{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}
async function cargarEmpleados() {
  const data=await apiGet({action:'getEmpleados'});
  state.empleados=data.map(r=>({nombre:r[0]||'',nss:r[1]||'',dni:r[2]||'',pin:(r[3]||'').toString().trim()})).filter(e=>e.nombre);
}
async function cargarFichajesEmpleado(nombre) {
  try {
    const data=await apiGet({action:'getFichajes',nombre});
    state.fichajes[nombre]=Array.isArray(data)?data.map(r=>({fecha:r[0]||'',tipo:r[1]||'',hora:r[2]||'',foto:r[3]||''})):[];
  } catch{state.fichajes[nombre]=[];}
}
async function syncSheets() {
  try { await cargarEmpleados(); for(const e of state.empleados) await cargarFichajesEmpleado(e.nombre); renderEmpleados(); } catch(e){console.warn(e);}
}

function renderEmpleados() {
  const g=document.getElementById('emp-grid'); if(!g) return;
  g.innerHTML=state.empleados.map((emp,i)=>{
    const fichs=state.fichajes[emp.nombre]||[];
    const ultimo=fichs[fichs.length-1];
    const enTrabajo=ultimo&&ultimo.tipo==='ENTRADA';
    return `<div class="emp-card" onclick="seleccionarEmpleado(${i})">
      <div class="emp-name">${primerNombre(emp.nombre)}</div>
      <span class="badge ${enTrabajo?'badge-in':'badge-out'}">${enTrabajo?'Trabajando':'Descansando'}</span>
    </div>`;
  }).join('');
}

function seleccionarEmpleado(i) {
  state.empleadoActual=state.empleados[i]; state.pinIngresado='';
  document.getElementById('pin-name').textContent=state.empleadoActual.nombre;
  document.getElementById('pin-avatar').textContent=getInitials(state.empleadoActual.nombre);
  document.getElementById('pin-error').textContent='';
  actualizarPinDots(); showScreen('screen-pin');
}
function addPin(n){if(state.pinIngresado.length>=4)return;state.pinIngresado+=n.toString();actualizarPinDots();if(state.pinIngresado.length===4)setTimeout(verificarPin,120);}
function deletePin(){state.pinIngresado=state.pinIngresado.slice(0,-1);actualizarPinDots();}
function clearPin(){state.pinIngresado='';actualizarPinDots();}
function actualizarPinDots(){for(let i=0;i<4;i++){const d=document.getElementById('p'+i);if(d)d.className='pin-dot'+(i<state.pinIngresado.length?' filled':'');}}
function verificarPin(){
  if(state.pinIngresado===(state.empleadoActual.pin||'').toString().trim()){
    mostrarPantallaFichaje();
  } else {
    document.getElementById('pin-error').textContent='PIN incorrecto. Inténtalo de nuevo.';
    for(let i=0;i<4;i++){const d=document.getElementById('p'+i);if(d)d.className='pin-dot error';}
    state.pinIngresado='';
    setTimeout(()=>{actualizarPinDots();document.getElementById('pin-error').textContent='';},800);
  }
}

async function mostrarPantallaFichaje() {
  showScreen('screen-fichar');
  if(state.tiempoInterval){clearInterval(state.tiempoInterval);state.tiempoInterval=null;}
  const emp=state.empleadoActual;
  document.getElementById('fich-nombre').textContent=primerNombre(emp.nombre);
  await cargarFichajesEmpleado(emp.nombre);
  const fichs=state.fichajes[emp.nombre]||[];
  const ultimo=fichs[fichs.length-1];
  const ultimoTipo=ultimo?ultimo.tipo:null;
  const wrap=document.getElementById('fich-entrada-wrap');
  const btnE=document.getElementById('btn-entrada');
  const btnS=document.getElementById('btn-salida');

  if(ultimoTipo==='ENTRADA') {
    wrap.style.display='block';
    document.getElementById('fich-entrada-val').textContent=`${fmtFecha(ultimo.fecha)} · ${fmtHora(ultimo.hora)}`;
    function actualizarTiempo(){
      const t=calcTiempo(ultimo);
      document.getElementById('fich-tiempo-val').textContent=t?t.texto:'—';
    }
    actualizarTiempo();
    state.tiempoInterval=setInterval(actualizarTiempo,30000);
    btnE.className='btn btn-disabled'; btnE.onclick=null;
    btnS.className='btn btn-danger'; btnS.onclick=()=>registrarFichaje('SALIDA');
  } else {
    wrap.style.display='none';
    btnE.className='btn btn-success'; btnE.onclick=()=>registrarFichaje('ENTRADA');
    btnS.className='btn btn-disabled'; btnS.onclick=null;
  }

  const ultimos4=fichs.slice(-4).reverse();
  document.getElementById('fich-history-body').innerHTML=ultimos4.length
    ?ultimos4.map(f=>`<tr>
        <td style="color:${f.tipo==='ENTRADA'?'var(--green)':'var(--red)'};font-weight:500;">${f.tipo}</td>
        <td>${fmtFecha(f.fecha)}</td>
        <td>${fmtHora(f.hora)}</td>
      </tr>`).join('')
    :'<tr><td colspan="3" style="color:var(--text3);padding:8px 12px;">Sin fichajes anteriores</td></tr>';

  try {
    state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    document.getElementById('video').srcObject=state.stream;
    document.getElementById('cam-alert').style.display='none';
  } catch {
    document.getElementById('cam-alert').style.display='block';
    document.getElementById('cam-alert').textContent='Cámara no disponible. Se registrará sin foto.';
  }
}

function cancelarFichaje(){
  if(state.tiempoInterval){clearInterval(state.tiempoInterval);state.tiempoInterval=null;}
  if(state.stream){state.stream.getTracks().forEach(t=>t.stop());state.stream=null;}
  showScreen('screen-main');
}
function capturarFoto(){
  try{const v=document.getElementById('video'),c=document.getElementById('canvas');c.width=320;c.height=240;c.getContext('2d').drawImage(v,0,0,320,240);return c.toDataURL('image/jpeg',0.65);}catch{return'';}
}

async function registrarFichaje(tipo) {
  if(state.tiempoInterval){clearInterval(state.tiempoInterval);state.tiempoInterval=null;}
  const emp=state.empleadoActual;
  const foto=capturarFoto();
  if(state.stream){state.stream.getTracks().forEach(t=>t.stop());state.stream=null;}
  const ahora=new Date();
  const fecha=`${String(ahora.getDate()).padStart(2,'0')}/${String(ahora.getMonth()+1).padStart(2,'0')}/${ahora.getFullYear()}`;
  const hora=`${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

  let tiempoTexto=null;
  let horasTrabajadas=0;
  if(tipo==='SALIDA') {
    const fichs=state.fichajes[emp.nombre]||[];
    const ultimaEntrada=[...fichs].reverse().find(f=>f.tipo==='ENTRADA');
    if(ultimaEntrada){
      const t=calcTiempo(ultimaEntrada);
      if(t){
        tiempoTexto=`Has trabajado ${t.h} horas y ${t.m} minutos`;
        horasTrabajadas=t.h;
      }
    }
  }

  if(!state.fichajes[emp.nombre]) state.fichajes[emp.nombre]=[];
  state.fichajes[emp.nombre].push({fecha,tipo,hora,foto:foto?'si':''});
  try{await apiPost({nombre:emp.nombre,fecha,tipo,hora,foto:foto?'si':''});}catch(e){console.warn(e);}
  renderEmpleados();
  mostrarExito(tipo,hora,foto,tiempoTexto,horasTrabajadas);
}

function mostrarExito(tipo, hora, foto, tiempoTexto, horasTrabajadas) {
  const icon=document.getElementById('success-icon');
  icon.textContent='✓';
  icon.className='success-icon '+(tipo==='ENTRADA'?'entrada':'salida');
  document.getElementById('success-title').textContent=tipo==='ENTRADA'?'Entrada registrada':'Salida registrada';
  document.getElementById('success-sub').textContent=`${primerNombre(state.empleadoActual.nombre)} · ${hora}`;

  const tEl=document.getElementById('success-tiempo');
  if(tiempoTexto && tipo==='SALIDA'){tEl.textContent=tiempoTexto;tEl.style.display='block';}
  else{tEl.style.display='none';}

  const avisoEl=document.getElementById('aviso-horario');
  if(tipo==='SALIDA' && horasTrabajadas>=10){
    avisoEl.style.display='block';
  } else {
    avisoEl.style.display='none';
  }

  const img=document.getElementById('success-photo');
  if(foto){img.src=foto;img.style.display='block';}else{img.style.display='none';}

  showScreen('screen-success');
  setTimeout(()=>showScreen('screen-main'), 5000);
}

async function init() {
  try {
    await cargarEmpleados();
    for(const emp of state.empleados) await cargarFichajesEmpleado(emp.nombre);
    renderEmpleados(); showScreen('screen-main');
  } catch(e) {
    document.getElementById('screen-loading').innerHTML=
      `<div style="text-align:center;padding:4rem 1rem;"><p style="color:var(--red);margin-bottom:1rem;">Error: ${e.message}</p>
      <button onclick="init()" style="padding:10px 20px;border-radius:8px;border:none;background:var(--text);color:white;cursor:pointer;font-size:14px;">↻ Reintentar</button></div>`;
  }
}

init();
</script>
</body>
</html>

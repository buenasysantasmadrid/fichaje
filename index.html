<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichaje · Buenas y Santas</title>
<link rel="icon" href="logo_buenasysantas.jpg" type="image/jpeg">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fichaje">
<meta name="theme-color" content="#2d6a35">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1c1a16;
  --text2: #7a7669;
  --text3: #b0ada4;
  --olive: #2d6a35;
  --olive-light: #e6f4e8;
  --red: #b5182b;
  --red-light: #fde8eb;
  --amber: #92600a;
  --amber-light: #fdf3e3;
  --r: 16px;
  --r-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
}
#app { width: 100%; max-width: 440px; min-height: 100vh; display: flex; flex-direction: column; padding: 1.5rem 1.25rem 2.5rem; }
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

.loading-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.spinner {
  width: 40px; height: 40px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--olive);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
.loading-text { font-size: 13px; color: var(--text2); letter-spacing: 0.5px; }

.app-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}
.logo-wrap {
  width: 64px; height: 64px; border-radius: 14px;
  overflow: hidden; flex-shrink: 0;
  border: 1px solid var(--border2);
  background: white;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
.header-text { flex: 1; }
.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); line-height: 1;
}
.app-date {
  font-size: 14px; color: var(--text2); margin-top: 4px;
  font-weight: 400; letter-spacing: 0.01em;
}
.sync-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.sync-btn:hover { background: var(--surface2); color: var(--text); }
.sync-btn.spinning svg { animation: spin 0.8s linear infinite; }

.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text2);
  margin-bottom: 10px;
}

.emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.emp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.1rem 1rem;
  cursor: pointer;
  transition: all 0.18s;
  animation: fadeUp 0.3s ease both;
  display: flex; flex-direction: column; gap: 10px;
}
.emp-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.07);
}
.emp-card:active { transform: translateY(0); }
.emp-name {
  font-size: 16px; font-weight: 600; color: var(--text);
  font-family: 'Playfair Display', serif;
}
.emp-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700;
  padding: 5px 11px; border-radius: 20px;
  width: fit-content; letter-spacing: 0.01em;
}
.status-working { background: var(--olive-light); color: var(--olive); border: 1.5px solid rgba(45,106,53,0.25); }
.status-resting { background: var(--red-light); color: var(--red); border: 1.5px solid rgba(181,24,43,0.2); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.status-dot.pulse { animation: pulse 1.5s ease-in-out infinite; }

.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: none; border: none; padding: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--text2);
  cursor: pointer; margin-bottom: 1.75rem;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }
.back-btn svg { width: 14px; height: 14px; }

.pin-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
.pin-name-lg {
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
  margin-bottom: 6px; text-align: center;
}
.pin-hint { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
.pin-dots { display: flex; gap: 14px; margin-bottom: 0.75rem; }
.pin-dot {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent; transition: all 0.15s;
}
.pin-dot.filled { background: var(--text); border-color: var(--text); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.35s; }
.pin-error { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 1.5rem; text-align: center; }
.numpad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; width: 100%; max-width: 360px;
}
.num-btn {
  padding: 22px 16px; border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: 'DM Sans', sans-serif;
  font-size: 26px; font-weight: 400;
  color: var(--text); cursor: pointer;
  transition: all 0.12s; text-align: center; line-height: 1;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.num-btn:hover { background: var(--surface2); border-color: var(--border2); }
.num-btn:active { transform: scale(0.94); background: var(--surface2); }
.num-btn.del { font-size: 20px; }
.num-btn.clr { font-size: 15px; color: var(--text2); }

.fich-name {
  font-family: 'Playfair Display', serif;
  font-size: 38px; letter-spacing: -1px;
  text-align: center; margin-bottom: 1.25rem; line-height: 1;
}
.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.info-chip { border-radius: var(--r-sm); padding: 12px 14px; }
.info-chip-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.info-chip-value { font-size: 17px; font-weight: 600; }
.chip-green { background: var(--olive-light); }
.chip-green .info-chip-label { color: var(--olive); }
.chip-green .info-chip-value { color: var(--olive); }
.chip-gray { background: var(--surface2); }
.chip-gray .info-chip-label { color: var(--text2); }
.chip-gray .info-chip-value { color: var(--text); }
.video-wrap {
  border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border); background: #1a1a1a;
  aspect-ratio: 4/3; margin-bottom: 1rem; position: relative;
}
#video { width: 100%; display: block; }
#canvas { display: none; }
.cam-off {
  display: none; position: absolute; inset: 0;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; color: #888;
  font-size: 12px; text-align: center;
}
.cam-off svg { width: 32px; height: 32px; opacity: 0.4; }
.action-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.btn-fichar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 20px; border-radius: var(--r-sm);
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
  letter-spacing: 0.01em;
}
.btn-entrada { background: var(--olive); color: white; border-color: var(--olive); }
.btn-entrada:hover { background: #235229; }
.btn-salida { background: var(--red); color: white; border-color: var(--red); }
.btn-salida:hover { background: #8c1020; }
.btn-disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; opacity: 0.45; border-color: var(--border); }
.hist-wrap { margin-top: 0.25rem; }
.hist-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
.hist-list { background: var(--surface); border-radius: var(--r-sm); border: 1px solid var(--border); overflow: hidden; }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.hist-row:last-child { border-bottom: none; }
.hist-type { font-weight: 600; min-width: 60px; }
.hist-type.e { color: var(--olive); }
.hist-type.s { color: var(--red); }
.hist-fecha { color: var(--text2); flex: 1; }
.hist-hora { font-weight: 500; }

.success-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 1rem;
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.success-icon {
  width: 90px; height: 90px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.25rem; font-size: 38px;
}
.icon-entrada { background: var(--olive-light); }
.icon-salida { background: var(--red-light); }
.success-name { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.success-hora { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; letter-spacing: -0.3px; }
.success-tiempo { background: var(--olive-light); color: var(--olive); padding: 16px 24px; border-radius: var(--r-sm); font-size: 22px; font-weight: 700; margin-bottom: 1rem; border: 1.5px solid rgba(45,106,53,0.2); letter-spacing: -0.3px; }
.aviso-ojo { background: var(--red-light); color: var(--red); padding: 18px 24px; border-radius: var(--r-sm); font-size: 26px; font-weight: 800; margin-bottom: 1rem; border: 2px solid rgba(181,24,43,0.25); letter-spacing: -0.3px; }
.success-photo { width: 120px; height: 90px; object-fit: cover; border-radius: var(--r-sm); border: 1px solid var(--border); margin-bottom: 1rem; }
.countdown-bar-wrap { width: 100%; max-width: 240px; height: 3px; background: var(--border); border-radius: 99px; margin-top: 1.5rem; overflow: hidden; }
.countdown-bar { height: 100%; background: var(--olive); border-radius: 99px; transition: width linear; }

.error-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; }
.error-msg { font-size: 14px; color: var(--red); max-width: 280px; line-height: 1.6; }
.retry-btn { padding: 10px 24px; border-radius: var(--r-sm); background: var(--text); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-loading" class="screen active">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Cargando...</div>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <div class="app-header">
      <div class="logo-wrap">
        <img src="logo_buenasysantas.jpg" alt="Logo" onerror="this.style.display='none'">
      </div>
      <div class="header-text">
        <div class="app-title">Fichaje</div>
        <div class="app-date" id="header-date"></div>
      </div>
      <button class="sync-btn" id="sync-btn" onclick="syncSheets()" title="Actualizar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 019-9 9 9 0 016.36 2.64L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9 9 0 01-6.36-2.64L3 16"/><path d="M3 21v-5h5"/>
        </svg>
      </button>
    </div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <div id="screen-pin" class="screen">
    <button class="back-btn" onclick="showScreen('screen-main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <div class="pin-wrap">
      <div class="pin-name-lg" id="pin-name"></div>
      <div class="pin-hint">Introduce tu PIN de 4 dígitos</div>
      <div class="pin-dots">
        <div class="pin-dot" id="p0"></div>
        <div class="pin-dot" id="p1"></div>
        <div class="pin-dot" id="p2"></div>
        <div class="pin-dot" id="p3"></div>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="numpad">
        <button class="num-btn" onclick="addPin(1)">1</button>
        <button class="num-btn" onclick="addPin(2)">2</button>
        <button class="num-btn" onclick="addPin(3)">3</button>
        <button class="num-btn" onclick="addPin(4)">4</button>
        <button class="num-btn" onclick="addPin(5)">5</button>
        <button class="num-btn" onclick="addPin(6)">6</button>
        <button class="num-btn" onclick="addPin(7)">7</button>
        <button class="num-btn" onclick="addPin(8)">8</button>
        <button class="num-btn" onclick="addPin(9)">9</button>
        <button class="num-btn clr" onclick="clearPin()">C</button>
        <button class="num-btn" onclick="addPin(0)">0</button>
        <button class="num-btn del" onclick="deletePin()">⌫</button>
      </div>
    </div>
  </div>

  <div id="screen-fichar" class="screen">
    <button class="back-btn" onclick="cancelarFichaje()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <div id="fichar-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;">
      <div class="spinner"></div>
      <div class="loading-text">Cargando fichajes...</div>
    </div>
    <div id="fichar-content" style="display:none; flex-direction:column; flex:1;">
      <div class="fich-name" id="fich-nombre"></div>
      <div id="fich-entrada-wrap" class="info-row" style="display:none;">
        <div class="info-chip chip-green">
          <div class="info-chip-label">Entrada</div>
          <div class="info-chip-value" id="fich-entrada-val"></div>
        </div>
        <div class="info-chip chip-gray">
          <div class="info-chip-label">Tiempo</div>
          <div class="info-chip-value" id="fich-tiempo-val">—</div>
        </div>
      </div>
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-off" id="cam-off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18.36 6.64A9 9 0 015.64 19.36M9.76 9.76A3 3 0 0014.24 14.24M12 3v1M12 20v1M3 12h1M20 12h1M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42"/></svg>
          Sin cámara
        </div>
      </div>
      <div class="action-btns">
        <button id="btn-entrada" class="btn-fichar btn-entrada" onclick="registrarFichaje('ENTRADA')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M14 12H3"/></svg>
          Registrar Entrada
        </button>
        <button id="btn-salida" class="btn-fichar btn-salida" onclick="registrarFichaje('SALIDA')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Registrar Salida
        </button>
      </div>
      <div class="hist-wrap">
        <div class="hist-title">Últimos fichajes</div>
        <div class="hist-list" id="fich-history"></div>
      </div>
    </div>
  </div>

  <div id="screen-success" class="screen">
    <div class="success-wrap">
      <div class="success-icon" id="success-icon">✓</div>
      <div class="success-name" id="success-name"></div>
      <div class="success-hora" id="success-hora"></div>
      <div class="success-tiempo" id="success-tiempo" style="display:none;"></div>
      <div class="aviso-ojo" id="aviso-ojo" style="display:none;">⚠️ OJO HORARIO</div>
      <img id="success-photo" class="success-photo" src="" alt="" style="display:none;">
      <div class="countdown-bar-wrap">
        <div class="countdown-bar" id="countdown-bar" style="width:100%;"></div>
      </div>
    </div>
  </div>

</div>
<canvas id="canvas" style="display:none;"></canvas>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypMnnN4c7Wh8FQzFFrE9r_dxH2JlfhvwikBo7-iGks0KFegjEm0XAdWEymNmie4VlU/exec';

const state = {
  empleados: [],
  empleadoActual: null,
  pinIngresado: '',
  stream: null,
  tiempoInterval: null,
  countdownTimeout: null,
};

function apiGetJSONP(params, timeoutMs) {
  timeoutMs = timeoutMs || 40000;
  return new Promise(function(resolve, reject) {
    var cbName = '_gs_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    var script = document.createElement('script');
    var timer = setTimeout(function() { cleanup(); reject(new Error('Timeout')); }, timeoutMs);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); resolve(data); };
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    script.src = SCRIPT_URL + '?' + qs;
    script.onerror = function() { cleanup(); reject(new Error('Error de red')); };
    document.head.appendChild(script);
  });
}

function apiGetJSONPWithRetry(params, timeoutMs, retries) {
  retries = (retries !== undefined) ? retries : 4;
  timeoutMs = timeoutMs || 40000;
  var lastErr;
  function attempt(n) {
    return apiGetJSONP(params, timeoutMs).catch(function(e) {
      lastErr = e;
      if (n < retries) {
        return new Promise(function(r) { setTimeout(r, (n+1)*1500); }).then(function() { return attempt(n+1); });
      }
      throw lastErr;
    });
  }
  return attempt(0);
}

function apiPostForm(data) {
  return fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  }).catch(function(e) { console.warn('POST error:', e); });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function updateDate() {
  var el = document.getElementById('header-date');
  if (el) el.textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}
updateDate();
setInterval(updateDate, 60000);

function primerNombre(n) { return n.trim().split(/\s+/)[0]; }

function fmtFecha(v) {
  if (!v) return '—';
  var s = String(v).trim();
  if (s.includes('/')) {
    var p = s.split('/');
    if (p.length === 3) return p[0].padStart(2,'0') + '/' + p[1].padStart(2,'0') + '/' + p[2];
  }
  return s;
}

function fmtHora(v) {
  if (!v) return '—';
  return String(v).trim().substring(0, 5);
}

function horaAMin(h) {
  var s = String(h).trim().substring(0, 5).split(':');
  if (s.length < 2) return 0;
  return parseInt(s[0]) * 60 + parseInt(s[1]);
}

function diferenciaMin(e, s) {
  var em = horaAMin(e), sm = horaAMin(s);
  if (sm < em) sm += 24 * 60;
  return sm - em;
}

function calcTiempo(fichaje) {
  try {
    var f = fmtFecha(fichaje.fecha), h = fmtHora(fichaje.hora);
    if (!f || !h || f === '—' || h === '—') return null;
    var fp = f.split('/'), hp = h.split(':');
    if (fp.length !== 3 || hp.length < 2) return null;
    var dt = new Date(parseInt(fp[2]), parseInt(fp[1])-1, parseInt(fp[0]), parseInt(hp[0]), parseInt(hp[1]), 0);
    var diff = Date.now() - dt.getTime();
    if (diff < 0) return null;
    var totalMin = Math.floor(diff / 60000);
    return Math.floor(totalMin/60) + 'h ' + (totalMin%60) + 'min';
  } catch(e) { return null; }
}

async function cargarEmpleados() {
  var data = await apiGetJSONPWithRetry({ action: 'getEmpleados' }, 40000, 4);
  var rows = Array.isArray(data) ? data : (data.data || []);
  state.empleados = rows
    .map(function(r) {
      return { nombre: r[0] || '', nss: r[1] || '', dni: r[2] || '', pin: String(r[3] || '').trim() };
    })
    .filter(function(e) { return e.nombre; });
}

function renderEmpleados(fichajesMap) {
  var g = document.getElementById('emp-grid');
  if (!g) return;
  g.innerHTML = state.empleados.map(function(emp, i) {
    var fichs   = fichajesMap ? (fichajesMap[emp.nombre] || []) : null;
    var ultimo  = fichs ? fichs[0] : null;
    var working = ultimo && ultimo.tipo === 'ENTRADA';
    var hasData = fichs !== null;
    return '<div class="emp-card" onclick="seleccionarEmpleado(' + i + ')" style="animation-delay:' + (i*0.04) + 's">'
      + '<div>'
      + '<div class="emp-name">' + primerNombre(emp.nombre) + '</div>'
      + (hasData
          ? '<span class="emp-status ' + (working ? 'status-working' : 'status-resting') + '">'
            + '<span class="status-dot ' + (working ? 'pulse' : '') + '"></span>'
            + (working ? 'Trabajando' : 'Descansando')
            + '</span>'
          : '<span class="emp-status status-resting" style="opacity:0.4">—</span>')
      + '</div></div>';
  }).join('');
}

var syncFichajesMap = null;

async function syncSheets() {
  var btn = document.getElementById('sync-btn');
  if (btn) btn.classList.add('spinning');
  try {
    await cargarEmpleados();
    var results = await Promise.all(
      state.empleados.map(async function(e) {
        try {
          var data = await apiGetJSONPWithRetry({ action: 'getFichajes', nombre: e.nombre }, 40000, 4);
          var rows = Array.isArray(data) ? data : (data.data || []);
          return [e.nombre, rows.map(function(r) {
            return { fecha: r[0]||'', tipo: r[1]||'', hora: r[2]||'', foto: r[3]||'' };
          })];
        } catch(err) { return [e.nombre, []]; }
      })
    );
    syncFichajesMap = Object.fromEntries(results);
    renderEmpleados(syncFichajesMap);
  } catch(e) { console.warn('Sync error:', e); }
  finally { if (btn) btn.classList.remove('spinning'); }
}

function seleccionarEmpleado(i) {
  state.empleadoActual = state.empleados[i];
  state.pinIngresado = '';
  document.getElementById('pin-name').textContent = state.empleadoActual.nombre;
  document.getElementById('pin-error').textContent = '';
  actualizarPinDots();
  showScreen('screen-pin');
}

function addPin(n) {
  if (state.pinIngresado.length >= 4) return;
  state.pinIngresado += n.toString();
  actualizarPinDots();
  if (state.pinIngresado.length === 4) setTimeout(verificarPin, 130);
}
function deletePin() { state.pinIngresado = state.pinIngresado.slice(0,-1); actualizarPinDots(); }
function clearPin()  { state.pinIngresado = ''; actualizarPinDots(); }

function actualizarPinDots() {
  for (var i = 0; i < 4; i++) {
    var d = document.getElementById('p' + i);
    if (d) d.className = 'pin-dot' + (i < state.pinIngresado.length ? ' filled' : '');
  }
}

function verificarPin() {
  if (state.pinIngresado === (state.empleadoActual.pin || '').toString().trim()) {
    mostrarPantallaFichaje();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Inténtalo de nuevo.';
    for (var i = 0; i < 4; i++) {
      var d = document.getElementById('p' + i);
      if (d) d.className = 'pin-dot error';
    }
    state.pinIngresado = '';
    setTimeout(function() { actualizarPinDots(); document.getElementById('pin-error').textContent = ''; }, 800);
  }
}

async function mostrarPantallaFichaje() {
  showScreen('screen-fichar');
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }
  document.getElementById('fichar-loading').style.display = 'flex';
  document.getElementById('fichar-content').style.display = 'none';
  var emp = state.empleadoActual;
  document.getElementById('fich-nombre').textContent = primerNombre(emp.nombre);
  var fichs = [];
  try {
    var data = await apiGetJSONPWithRetry({ action: 'getFichajes', nombre: emp.nombre }, 40000, 4);
    var rows = Array.isArray(data) ? data : (data.data || []);
    fichs = rows.map(function(r) {
      return { fecha: r[0]||'', tipo: r[1]||'', hora: r[2]||'', foto: r[3]||'' };
    });
  } catch(e) { console.warn('Error cargando fichajes:', e); }
  if (syncFichajesMap) syncFichajesMap[emp.nombre] = fichs;
  document.getElementById('fichar-loading').style.display = 'none';
  document.getElementById('fichar-content').style.display = 'flex';
  var ultimo = fichs[0];
  var ultimoTipo = ultimo ? ultimo.tipo : null;
  var wrap = document.getElementById('fich-entrada-wrap');
  var btnE = document.getElementById('btn-entrada');
  var btnS = document.getElementById('btn-salida');
  if (ultimoTipo === 'ENTRADA') {
    wrap.style.display = 'grid';
    document.getElementById('fich-entrada-val').textContent = fmtFecha(ultimo.fecha) + ' · ' + fmtHora(ultimo.hora);
    function tick() {
      var t = calcTiempo(ultimo);
      document.getElementById('fich-tiempo-val').textContent = t || '—';
    }
    tick();
    state.tiempoInterval = setInterval(tick, 30000);
    btnE.className = 'btn-fichar btn-disabled'; btnE.onclick = null;
    btnS.className = 'btn-fichar btn-salida';   btnS.onclick = function() { registrarFichaje('SALIDA'); };
  } else {
    wrap.style.display = 'none';
    btnE.className = 'btn-fichar btn-entrada'; btnE.onclick = function() { registrarFichaje('ENTRADA'); };
    btnS.className = 'btn-fichar btn-disabled'; btnS.onclick = null;
  }
  var primeros4 = fichs.slice(0, 4);
  document.getElementById('fich-history').innerHTML = primeros4.length
    ? primeros4.map(function(f) {
        return '<div class="hist-row">'
          + '<span class="hist-type ' + (f.tipo === 'ENTRADA' ? 'e' : 's') + '">' + f.tipo + '</span>'
          + '<span class="hist-fecha">' + fmtFecha(f.fecha) + '</span>'
          + '<span class="hist-hora">' + fmtHora(f.hora) + '</span>'
          + '</div>';
      }).join('')
    : '<div class="hist-row" style="color:var(--text2);">Sin fichajes anteriores</div>';
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    document.getElementById('video').srcObject = state.stream;
    document.getElementById('cam-off').style.display = 'none';
  } catch(e) {
    document.getElementById('cam-off').style.display = 'flex';
  }
}

function cancelarFichaje() {
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }
  if (state.stream) { state.stream.getTracks().forEach(function(t) { t.stop(); }); state.stream = null; }
  showScreen('screen-main');
}

function capturarFoto() {
  try {
    var v = document.getElementById('video'), c = document.getElementById('canvas');
    c.width = 320; c.height = 240;
    c.getContext('2d').drawImage(v, 0, 0, 320, 240);
    return c.toDataURL('image/jpeg', 0.65);
  } catch(e) { return ''; }
}

async function registrarFichaje(tipo) {
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }
  var emp  = state.empleadoActual;
  var foto = capturarFoto();
  if (state.stream) { state.stream.getTracks().forEach(function(t) { t.stop(); }); state.stream = null; }
  var ahora = new Date();
  var fecha = String(ahora.getDate()).padStart(2,'0') + '/'
            + String(ahora.getMonth()+1).padStart(2,'0') + '/'
            + ahora.getFullYear();
  var hora  = String(ahora.getHours()).padStart(2,'0') + ':' + String(ahora.getMinutes()).padStart(2,'0');
  var tiempoTexto = null, horasTrabajadas = 0;
  var fichs = syncFichajesMap && syncFichajesMap[emp.nombre] ? syncFichajesMap[emp.nombre] : [];
  if (tipo === 'SALIDA') {
    var ultimaEntrada = null;
    for (var k = 0; k < fichs.length; k++) {
      if (fichs[k].tipo === 'ENTRADA') { ultimaEntrada = fichs[k]; break; }
    }
    if (ultimaEntrada) {
      var minTurno = diferenciaMin(ultimaEntrada.hora, hora);
      var h = Math.floor(minTurno / 60), m = minTurno % 60;
      tiempoTexto = 'Has trabajado ' + h + ' horas y ' + m + ' minutos';
      horasTrabajadas = h;
    }
  }
  if (syncFichajesMap) {
    if (!syncFichajesMap[emp.nombre]) syncFichajesMap[emp.nombre] = [];
    syncFichajesMap[emp.nombre].unshift({ fecha: fecha, tipo: tipo, hora: hora, foto: foto ? 'si' : '' });
  }
  renderEmpleados(syncFichajesMap);
  apiPostForm({
    action: 'addFichaje',
    nombre: emp.nombre,
    fecha:  fecha,
    tipo:   tipo,
    hora:   hora,
    foto:   foto ? 'si' : ''
  }).catch(function(e) { console.warn('Error guardando fichaje:', e); });
  mostrarExito(tipo, hora, foto, tiempoTexto, horasTrabajadas);
}

function mostrarExito(tipo, hora, foto, tiempoTexto, horasTrabajadas) {
  var icon = document.getElementById('success-icon');
  icon.className = 'success-icon ' + (tipo === 'ENTRADA' ? 'icon-entrada' : 'icon-salida');
  icon.textContent = tipo === 'ENTRADA' ? '↗' : '↙';
  document.getElementById('success-name').textContent = primerNombre(state.empleadoActual.nombre);
  document.getElementById('success-hora').textContent = tipo === 'ENTRADA' ? 'Entrada · ' + hora : 'Salida · ' + hora;
  var tEl = document.getElementById('success-tiempo');
  if (tiempoTexto && tipo === 'SALIDA') { tEl.textContent = tiempoTexto; tEl.style.display = 'block'; }
  else { tEl.style.display = 'none'; }
  document.getElementById('aviso-ojo').style.display = (tipo === 'SALIDA' && horasTrabajadas >= 11) ? 'block' : 'none';
  var img = document.getElementById('success-photo');
  if (foto) { img.src = foto; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
  showScreen('screen-success');
  var bar = document.getElementById('countdown-bar');
  if (bar) {
    bar.style.transition = 'none'; bar.style.width = '100%';
    setTimeout(function() { bar.style.transition = 'width 5s linear'; bar.style.width = '0%'; }, 50);
  }
  if (state.countdownTimeout) clearTimeout(state.countdownTimeout);
  state.countdownTimeout = setTimeout(function() { showScreen('screen-main'); }, 5000);
}

// INIT: muestra pantalla inmediatamente, carga en segundo plano
function init() {
  updateDate();
  showScreen('screen-main');
  syncSheets();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

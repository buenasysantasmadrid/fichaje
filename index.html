<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichaje</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #efede8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #9e9c94;
    --accent: #1a1a18;
    --green: #2d6a4f;
    --green-bg: #e8f5ee;
    --red: #9b2335;
    --red-bg: #fceef0;
    --blue: #1a4f7a;
    --blue-bg: #e8f0f8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  #app {
    width: 100%;
    max-width: 480px;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* HEADER */
  .app-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 2rem;
  }
  .app-logo {
    width: 48px; height: 48px;
    background: var(--text);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 22px;
  }
  .app-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .app-subtitle { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  /* CARDS */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  /* BUTTONS */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    border: 0.5px solid var(--border2);
    background: var(--surface); color: var(--text);
    margin-top: 10px;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: white; border-color: var(--text); }
  .btn-primary:hover { background: #333330; }
  .btn-success { background: var(--green-bg); color: var(--green); border-color: rgba(45,106,79,0.2); font-size: 16px; padding: 14px; }
  .btn-success:hover { background: #d4eddf; }
  .btn-danger { background: var(--red-bg); color: var(--red); border-color: rgba(155,35,53,0.2); font-size: 16px; padding: 14px; }
  .btn-danger:hover { background: #f5d8dc; }
  .btn-disabled { background: var(--surface2); color: var(--text3); border-color: var(--border); font-size: 16px; padding: 14px; cursor: not-allowed; opacity: 0.5; }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 13px; margin-top: 0; }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text2); cursor: pointer;
    padding: 0; margin-bottom: 1.5rem;
  }
  .btn-back:hover { color: var(--text); }

  /* SYNC */
  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text3);
    margin-bottom: 1.25rem;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .sync-dot.error { background: var(--red); }

  /* EMPLOYEE GRID */
  .emp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .emp-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .emp-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
  .avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 15px; color: var(--text2);
    margin: 0 auto 10px;
  }
  .emp-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .emp-last-fichs { font-size: 10px; color: var(--text3); margin-top: 6px; line-height: 1.6; text-align: left; }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-in { background: var(--green-bg); color: var(--green); }
  .badge-out { background: var(--red-bg); color: var(--red); }

  /* PIN */
  .pin-header { text-align: center; margin-bottom: 1.5rem; }
  .pin-avatar-large {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface2); border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 22px; color: var(--text2);
    margin: 0 auto 12px;
  }
  .pin-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
  .pin-hint { font-size: 13px; color: var(--text2); }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 1.5rem 0; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent; transition: all 0.15s;
  }
  .pin-dot.filled { background: var(--text); border-color: var(--text); }
  .pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; max-width: 260px; margin: 0 auto;
  }
  .num-btn {
    padding: 18px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 20px; font-weight: 400;
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: all 0.1s; text-align: center;
  }
  .num-btn:hover { background: var(--surface2); }
  .num-btn:active { transform: scale(0.95); }
  .num-btn.del { font-size: 16px; color: var(--text2); }
  .pin-error-msg {
    text-align: center; font-size: 13px; color: var(--red);
    margin-bottom: 1rem; min-height: 20px;
  }

  /* CLOCK */
  .clock-display {
    text-align: center; margin-bottom: 1.5rem;
  }
  .clock-time {
    font-family: 'DM Mono', monospace;
    font-size: 48px; font-weight: 400;
    letter-spacing: -2px; color: var(--text);
    line-height: 1;
  }
  .clock-date { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* VIDEO */
  .video-wrap {
    width: 100%; max-width: 320px;
    margin: 0 auto 1.25rem;
    border-radius: var(--radius);
    overflow: hidden;
    border: 0.5px solid var(--border);
    background: #111;
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
  }
  #video { width: 100%; display: block; }
  #canvas { display: none; }

  /* INFO ROWS */
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 0.5px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 13px; color: var(--text2); }
  .info-value { font-size: 14px; font-weight: 500; }

  /* SUCCESS */
  .success-wrap { text-align: center; padding: 2rem 1rem; }
  .success-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--green-bg);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 32px;
  }
  .success-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
  .success-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .photo-thumb {
    width: 140px; height: 105px; object-fit: cover;
    border-radius: var(--radius-sm); border: 0.5px solid var(--border);
    margin: 0 auto; display: block;
  }

  /* HISTORY TABLE */
  .history-section { margin-top: 1.5rem; }
  .history-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); }
  tr:last-child td { border-bottom: none; }

  /* ALERT */
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 1rem; }
  .alert-info { background: var(--blue-bg); color: var(--blue); }

  /* LOADING */
  .loading { text-align: center; padding: 4rem 1rem; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border2);
    border-top-color: var(--text); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }

  input[type="text"] {
    width: 100%; padding: 10px 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface2); color: var(--text);
    margin-top: 6px;
  }
  input:focus { outline: none; border-color: var(--text); }
  .field-label { font-size: 13px; color: var(--text2); margin-top: 12px; display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="screen-loading" class="screen active">
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-text">Conectando con Google Sheets...</p>
    </div>
  </div>

  <!-- PRINCIPAL -->
  <div id="screen-main" class="screen">
    <div class="app-header">
      <div class="app-logo">🕐</div>
      <div>
        <div class="app-title">Fichaje</div>
        <div class="app-subtitle" id="header-date"></div>
      </div>
      <div class="header-actions">
        <button class="btn btn-sm" onclick="syncSheets()">↻</button>
      </div>
    </div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <!-- PIN -->
  <div id="screen-pin" class="screen">
    <button class="btn-back" onclick="showScreen('screen-main')">← Volver</button>
    <div class="pin-header">
      <div class="pin-avatar-large" id="pin-avatar"></div>
      <div class="pin-name" id="pin-name"></div>
      <div class="pin-hint">Introduce tu PIN de 4 dígitos</div>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="p0"></div>
      <div class="pin-dot" id="p1"></div>
      <div class="pin-dot" id="p2"></div>
      <div class="pin-dot" id="p3"></div>
    </div>
    <div class="pin-error-msg" id="pin-error"></div>
    <div class="numpad">
      <button class="num-btn" onclick="addPin(1)">1</button>
      <button class="num-btn" onclick="addPin(2)">2</button>
      <button class="num-btn" onclick="addPin(3)">3</button>
      <button class="num-btn" onclick="addPin(4)">4</button>
      <button class="num-btn" onclick="addPin(5)">5</button>
      <button class="num-btn" onclick="addPin(6)">6</button>
      <button class="num-btn" onclick="addPin(7)">7</button>
      <button class="num-btn" onclick="addPin(8)">8</button>
      <button class="num-btn" onclick="addPin(9)">9</button>
      <button class="num-btn" onclick="clearPin()">C</button>
      <button class="num-btn" onclick="addPin(0)">0</button>
      <button class="num-btn del" onclick="deletePin()">⌫</button>
    </div>
  </div>

  <!-- FICHAJE -->
  <div id="screen-fichar" class="screen">
    <button class="btn-back" onclick="cancelarFichaje()">← Volver</button>
    <!-- Nombre grande -->
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div id="fich-nombre" style="font-size:32px;font-weight:700;letter-spacing:-1px;"></div>
      <div id="fich-ultimo-info" style="font-size:14px;color:var(--text2);margin-top:6px;"></div>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>
    <div id="cam-alert" class="alert alert-info" style="display:none;"></div>
    <button id="btn-entrada" class="btn btn-success" onclick="registrarFichaje('ENTRADA')">Registrar Entrada</button>
    <button id="btn-salida" class="btn btn-danger" onclick="registrarFichaje('SALIDA')" style="margin-top:8px;">Registrar Salida</button>
    <!-- Últimos fichajes -->
    <div style="margin-top:1.5rem;">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">Últimos fichajes</div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr>
            <th style="text-align:left;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);">Tipo</th>
            <th style="text-align:left;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);">Fecha</th>
            <th style="text-align:left;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);">Hora</th>
          </tr></thead>
          <tbody id="fich-history-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ÉXITO -->
  <div id="screen-success" class="screen">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <div class="success-title" id="success-title"></div>
      <div class="success-sub" id="success-sub"></div>
      <img id="success-photo" class="photo-thumb" src="" alt="" style="display:none;" />
    </div>
    <button class="btn btn-primary" onclick="showScreen('screen-main')">Volver al inicio</button>
    <div class="history-section">
      <div class="card" style="padding:0;overflow:hidden;">
        <table id="history-table"></table>
      </div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypMnnN4c7Wh8FQzFFrE9r_dxH2JlfhvwikBo7-iGks0KFegjEm0XAdWEymNmie4VlU/exec';

let state = {
  empleados: [], fichajes: {}, empleadoActual: null,
  pinIngresado: '', stream: null
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateClock() {
  const n = new Date();
  const t = n.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const d = n.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const el = document.getElementById('clock-display');
  const de = document.getElementById('date-display');
  const he = document.getElementById('header-date');
  if(el) el.textContent = t;
  if(de) de.textContent = d.charAt(0).toUpperCase() + d.slice(1);
  if(he) he.textContent = n.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
}
setInterval(updateClock, 1000); updateClock();

function getInitials(n) { return n.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase(); }

function setSyncStatus(ok, txt) {
  const d = document.getElementById('sync-dot');
  const t = document.getElementById('sync-text');
  if(d) { d.className = 'sync-dot' + (ok ? '' : ' error'); }
  if(t) t.textContent = txt;
  console.log(txt);
}

async function apiGet(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, {redirect: 'follow'});
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function apiPost(data) {
  const url = SCRIPT_URL + '?action=addFichaje';
  const res = await fetch(url, {
    method: 'POST', redirect: 'follow',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function cargarEmpleados() {
  const data = await apiGet({action: 'getEmpleados'});
  state.empleados = data.map(r => ({
    nombre: r[0]||'', nss: r[1]||'', dni: r[2]||'', pin: (r[3]||'').toString().trim()
  })).filter(e => e.nombre);
}

async function cargarFichajesEmpleado(nombre) {
  try {
    const data = await apiGet({action: 'getFichajes', nombre});
    state.fichajes[nombre] = Array.isArray(data)
      ? data.map(r => ({fecha:r[0]||'', tipo:r[1]||'', hora:r[2]||'', foto:r[3]||''}))
      : [];
  } catch { state.fichajes[nombre] = []; }
}

async function syncSheets() {
  setSyncStatus(false, 'Sincronizando...');
  try {
    await cargarEmpleados();
    for(const emp of state.empleados) await cargarFichajesEmpleado(emp.nombre);
    renderEmpleados();
    setSyncStatus(true, 'Sincronizado · ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}));
  } catch(e) {
    setSyncStatus(false, 'Error: ' + e.message);
  }
}

function primerNombre(nombre) { return nombre.trim().split(/\s+/)[0]; }

function fmtFecha(val) {
  if(!val) return '—';
  const s = String(val).trim();
  // ISO con T (posiblemente fecha-serial de Sheets como 1899-12-31...)
  if(s.includes('T')) {
    const d = new Date(s);
    if(!isNaN(d) && d.getFullYear() > 1900) {
      return d.toLocaleDateString('es-ES', {day:'2-digit', month:'long', year:'numeric'});
    }
    // Si el año es 1899 es un serial de hora, no fecha — devolver vacío
    return '';
  }
  // Formato d/m/yyyy o dd/mm/yyyy
  if(s.includes('/')) {
    const parts = s.split('/');
    if(parts.length === 3) {
      const d = new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
      if(!isNaN(d)) return d.toLocaleDateString('es-ES', {day:'2-digit', month:'long', year:'numeric'});
    }
  }
  return s;
}

function fmtHora(val) {
  if(!val) return '—';
  const s = String(val).trim();
  // ISO con T
  if(s.includes('T')) {
    const d = new Date(s);
    if(!isNaN(d)) return d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  }
  // HH:MM:SS o HH:MM — recortar a HH:MM
  if(s.includes(':')) return s.substring(0,5);
  return s;
}

function renderEmpleados() {
  const g = document.getElementById('emp-grid');
  if(!g) return;
  g.innerHTML = state.empleados.map((emp, i) => {
    const fichs = state.fichajes[emp.nombre]||[];
    const ultimo = fichs[fichs.length-1];
    const enTrabajo = ultimo && ultimo.tipo === 'ENTRADA';
    const ultimos4 = fichs.slice(-4).reverse();
    const fichajesHtml = ultimos4.length
      ? ultimos4.map(f => `<div style="display:flex;justify-content:space-between;gap:6px;">
          <span style="color:${f.tipo==='ENTRADA'?'var(--green)':'var(--red)'};font-weight:500;">${f.tipo==='ENTRADA'?'E':'S'}</span>
          <span>${fmtFecha(f.fecha)} ${fmtHora(f.hora)}</span>
        </div>`).join('')
      : '<span>Sin fichajes</span>';
    return `<div class="emp-card" onclick="seleccionarEmpleado(${i})">
      <div class="emp-name">${primerNombre(emp.nombre)}</div>
      <span class="badge ${enTrabajo?'badge-in':'badge-out'}">${enTrabajo?'Trabajando':'Descansando'}</span>
    </div>`;
  }).join('');
}

function seleccionarEmpleado(i) {
  state.empleadoActual = state.empleados[i];
  state.pinIngresado = '';
  document.getElementById('pin-name').textContent = state.empleadoActual.nombre;
  document.getElementById('pin-avatar').textContent = getInitials(state.empleadoActual.nombre);
  document.getElementById('pin-error').textContent = '';
  actualizarPinDots();
  showScreen('screen-pin');
}

function addPin(n) {
  if(state.pinIngresado.length >= 4) return;
  state.pinIngresado += n.toString();
  actualizarPinDots();
  if(state.pinIngresado.length === 4) setTimeout(verificarPin, 120);
}
function deletePin() { state.pinIngresado = state.pinIngresado.slice(0,-1); actualizarPinDots(); }
function clearPin() { state.pinIngresado = ''; actualizarPinDots(); }
function actualizarPinDots() {
  for(let i=0;i<4;i++) {
    const d = document.getElementById('p'+i);
    if(d) { d.className = 'pin-dot' + (i < state.pinIngresado.length ? ' filled' : ''); }
  }
}

function verificarPin() {
  if(state.pinIngresado === (state.empleadoActual.pin||'').toString().trim()) {
    mostrarPantallaFichaje();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Inténtalo de nuevo.';
    for(let i=0;i<4;i++) { const d=document.getElementById('p'+i); if(d) d.className='pin-dot error'; }
    state.pinIngresado = '';
    setTimeout(() => { actualizarPinDots(); document.getElementById('pin-error').textContent=''; }, 800);
  }
}

async function mostrarPantallaFichaje() {
  showScreen('screen-fichar');
  const emp = state.empleadoActual;
  document.getElementById('fich-nombre').textContent = primerNombre(emp.nombre);
  await cargarFichajesEmpleado(emp.nombre);
  const fichs = state.fichajes[emp.nombre]||[];
  const ultimo = fichs[fichs.length-1];
  const ultimoTipo = ultimo ? ultimo.tipo : null;

  // Info del último fichaje: solo mostrar si el último fue ENTRADA (para saber cuándo entró)
  const infoEl = document.getElementById('fich-ultimo-info');
  if(ultimoTipo === 'ENTRADA') {
    infoEl.textContent = `Entrada: ${fmtFecha(ultimo.fecha)} ${fmtHora(ultimo.hora)}`;
    infoEl.style.color = 'var(--green)';
  } else {
    infoEl.textContent = '';
  }

  // Bloquear botón según último fichaje
  const btnEntrada = document.getElementById('btn-entrada');
  const btnSalida = document.getElementById('btn-salida');
  if(ultimoTipo === 'ENTRADA') {
    btnEntrada.className = 'btn btn-disabled';
    btnEntrada.onclick = null;
    btnSalida.className = 'btn btn-danger';
    btnSalida.onclick = () => registrarFichaje('SALIDA');
  } else {
    btnEntrada.className = 'btn btn-success';
    btnEntrada.onclick = () => registrarFichaje('ENTRADA');
    btnSalida.className = 'btn btn-disabled';
    btnSalida.onclick = null;
  }

  // Últimos 4 fichajes
  const ultimos4 = fichs.slice(-4).reverse();
  document.getElementById('fich-history-body').innerHTML = ultimos4.length
    ? ultimos4.map(f => `<tr>
        <td style="padding:8px 12px;border-bottom:0.5px solid var(--border);color:${f.tipo==='ENTRADA'?'var(--green)':'var(--red)'};font-weight:500;">${f.tipo}</td>
        <td style="padding:8px 12px;border-bottom:0.5px solid var(--border);">${fmtFecha(f.fecha)}</td>
        <td style="padding:8px 12px;border-bottom:0.5px solid var(--border);">${fmtHora(f.hora)}</td>
      </tr>`).join('')
    : '<tr><td colspan="3" style="padding:8px 12px;color:var(--text3);">Sin fichajes anteriores</td></tr>';

  try {
    state.stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
    document.getElementById('video').srcObject = state.stream;
    document.getElementById('cam-alert').style.display = 'none';
  } catch {
    document.getElementById('cam-alert').style.display = 'block';
    document.getElementById('cam-alert').textContent = 'Cámara no disponible. Se registrará sin foto.';
  }
}

function cancelarFichaje() {
  if(state.stream) { state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
  showScreen('screen-main');
}

function capturarFoto() {
  try {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width=320; c.height=240;
    c.getContext('2d').drawImage(v,0,0,320,240);
    return c.toDataURL('image/jpeg', 0.65);
  } catch { return ''; }
}

async function registrarFichaje(tipo) {
  const emp = state.empleadoActual;
  const foto = capturarFoto();
  if(state.stream) { state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
  const ahora = new Date();
  const fecha = ahora.toLocaleDateString('es-ES');
  const hora = ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  if(!state.fichajes[emp.nombre]) state.fichajes[emp.nombre] = [];
  state.fichajes[emp.nombre].push({fecha, tipo, hora, foto: foto?'si':''});
  try { await apiPost({nombre: emp.nombre, fecha, tipo, hora, foto: foto?'si':''}); }
  catch(e) { console.warn('Error guardando:', e); }
  renderEmpleados();
  mostrarExito(tipo, hora, foto);
  // Volver automáticamente a pantalla principal tras 2.5 segundos
  setTimeout(() => showScreen('screen-main'), 2500);
}

function mostrarExito(tipo, hora, foto) {
  document.getElementById('success-title').textContent = tipo==='ENTRADA' ? '✓ Entrada registrada' : '✓ Salida registrada';
  document.getElementById('success-sub').textContent = `${primerNombre(state.empleadoActual.nombre)} · ${hora}`;
  const img = document.getElementById('success-photo');
  if(foto) { img.src=foto; img.style.display='block'; } else { img.style.display='none'; }
  const fichs = state.fichajes[state.empleadoActual.nombre]||[];
  const ultimos4 = fichs.slice(-4).reverse();
  document.getElementById('history-table').innerHTML =
    '<thead><tr><th>Tipo</th><th>Fecha</th><th>Hora</th></tr></thead><tbody>' +
    ultimos4.map(f=>`<tr>
      <td style="color:${f.tipo==='ENTRADA'?'var(--green)':'var(--red)'};font-weight:500;">${f.tipo}</td>
      <td>${fmtFecha(f.fecha)}</td><td>${fmtHora(f.hora)}</td>
    </tr>`).join('') + '</tbody>';
  showScreen('screen-success');
}

async function init() {
  try {
    await cargarEmpleados();
    for(const emp of state.empleados) await cargarFichajesEmpleado(emp.nombre);
    renderEmpleados();
    showScreen('screen-main');
    setSyncStatus(true, 'Conectado a Google Sheets');
  } catch(e) {
    document.getElementById('screen-loading').innerHTML =
      `<div class="loading"><p style="color:var(--red);margin-bottom:1rem;">Error: ${e.message}</p>
      <button class="btn btn-primary" style="max-width:220px;margin:0 auto;" onclick="init()">↻ Reintentar</button></div>`;
  }
}

init();
</script>
</body>
</html>

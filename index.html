<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichaje · Buenas y Santas</title>
<link rel="icon" href="logo_buenasysantas.jpg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1c1a16;
  --text2: #7a7669;
  --text3: #b0ad a4;
  --olive: #4a5240;
  --olive-light: #eef0eb;
  --red: #8b2131;
  --red-light: #fbecee;
  --amber: #92600a;
  --amber-light: #fdf3e3;
  --r: 16px;
  --r-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
}
#app { width: 100%; max-width: 440px; min-height: 100vh; display: flex; flex-direction: column; padding: 1.5rem 1.25rem 2.5rem; }
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

/* ── LOADING ── */
.loading-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.spinner {
  width: 40px; height: 40px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--olive);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
.loading-text { font-size: 13px; color: var(--text2); letter-spacing: 0.5px; }

/* ── HEADER ── */
.app-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}
.logo-wrap {
  width: 48px; height: 48px; border-radius: 12px;
  overflow: hidden; flex-shrink: 0;
  border: 1px solid var(--border2);
  background: white;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
.header-text { flex: 1; }
.app-title {
  font-family: 'Instrument Serif', serif;
  font-size: 24px; font-weight: 400; letter-spacing: -0.3px;
  color: var(--text); line-height: 1;
}
.app-date { font-size: 12px; color: var(--text2); margin-top: 3px; font-weight: 400; }
.sync-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.sync-btn:hover { background: var(--surface2); color: var(--text); }
.sync-btn.spinning { animation: spin 0.8s linear infinite; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text2);
  margin-bottom: 10px;
}

/* ── EMPLOYEE GRID ── */
.emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.emp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.1rem 1rem;
  cursor: pointer;
  transition: all 0.18s;
  animation: fadeUp 0.3s ease both;
  display: flex; flex-direction: column; gap: 10px;
}
.emp-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.07);
}
.emp-card:active { transform: translateY(0); }
.emp-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 600; color: var(--text2);
  flex-shrink: 0;
}
.emp-avatar.working { background: var(--olive-light); color: var(--olive); }
.emp-name { font-size: 15px; font-weight: 600; color: var(--text); }
.emp-status {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500;
  padding: 3px 9px; border-radius: 20px;
  width: fit-content;
}
.status-working {
  background: var(--olive-light); color: var(--olive);
}
.status-resting {
  background: var(--surface2); color: var(--text2);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}
.status-dot.pulse { animation: pulse 1.5s ease-in-out infinite; }

/* ── BACK BTN ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: none; border: none; padding: 0;
  font-family: 'Outfit', sans-serif;
  font-size: 13px; color: var(--text2);
  cursor: pointer; margin-bottom: 1.75rem;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }
.back-btn svg { width: 14px; height: 14px; }

/* ── PIN SCREEN ── */
.pin-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
.pin-avatar-lg {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 600; color: var(--text2);
  margin-bottom: 14px;
}
.pin-name-lg {
  font-family: 'Instrument Serif', serif;
  font-size: 26px; font-weight: 400; letter-spacing: -0.5px;
  margin-bottom: 6px; text-align: center;
}
.pin-hint { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
.pin-dots { display: flex; gap: 14px; margin-bottom: 0.75rem; }
.pin-dot {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent; transition: all 0.15s;
}
.pin-dot.filled { background: var(--text); border-color: var(--text); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.35s; }
.pin-error { font-size: 12px; color: var(--red); min-height: 18px; margin-bottom: 1.5rem; text-align: center; }
.numpad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; width: 100%; max-width: 280px;
}
.num-btn {
  padding: 16px; border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: 'Outfit', sans-serif;
  font-size: 22px; font-weight: 400;
  color: var(--text); cursor: pointer;
  transition: all 0.12s; text-align: center;
  line-height: 1;
}
.num-btn:hover { background: var(--surface2); border-color: var(--border2); }
.num-btn:active { transform: scale(0.94); background: var(--surface2); }
.num-btn.del { font-size: 16px; }
.num-btn.clr { font-size: 13px; color: var(--text2); }

/* ── FICHAR SCREEN ── */
.fich-name {
  font-family: 'Instrument Serif', serif;
  font-size: 38px; letter-spacing: -1px;
  text-align: center; margin-bottom: 1.25rem;
  line-height: 1;
}
.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.info-chip {
  border-radius: var(--r-sm); padding: 12px 14px;
}
.info-chip-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 4px;
}
.info-chip-value { font-size: 17px; font-weight: 600; }
.chip-green { background: var(--olive-light); }
.chip-green .info-chip-label { color: var(--olive); }
.chip-green .info-chip-value { color: var(--olive); }
.chip-gray { background: var(--surface2); }
.chip-gray .info-chip-label { color: var(--text2); }
.chip-gray .info-chip-value { color: var(--text); }
.video-wrap {
  border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border);
  background: #1a1a1a;
  aspect-ratio: 4/3; margin-bottom: 1rem;
  position: relative;
}
#video { width: 100%; display: block; }
#canvas { display: none; }
.cam-off {
  display: none; position: absolute; inset: 0;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; color: #888;
  font-size: 12px; text-align: center;
}
.cam-off svg { width: 32px; height: 32px; opacity: 0.4; }
.action-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.btn-fichar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 20px; border-radius: var(--r-sm);
  font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
  letter-spacing: 0.01em;
}
.btn-entrada {
  background: var(--olive); color: white; border-color: var(--olive);
}
.btn-entrada:hover { background: #3a4232; }
.btn-salida {
  background: var(--red); color: white; border-color: var(--red);
}
.btn-salida:hover { background: #6e1a28; }
.btn-disabled {
  background: var(--surface2); color: var(--text3, #b0ada4);
  cursor: not-allowed; opacity: 0.45; border-color: var(--border);
}
.hist-wrap { margin-top: 0.25rem; }
.hist-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text2); margin-bottom: 8px;
}
.hist-list { background: var(--surface); border-radius: var(--r-sm); border: 1px solid var(--border); overflow: hidden; }
.hist-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.hist-row:last-child { border-bottom: none; }
.hist-type { font-weight: 600; min-width: 60px; }
.hist-type.e { color: var(--olive); }
.hist-type.s { color: var(--red); }
.hist-fecha { color: var(--text2); flex: 1; }
.hist-hora { font-weight: 500; }

/* ── SUCCESS ── */
.success-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 1rem;
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.success-icon {
  width: 80px; height: 80px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.25rem; font-size: 34px;
}
.icon-entrada { background: var(--olive-light); }
.icon-salida { background: var(--red-light); }
.success-name {
  font-family: 'Instrument Serif', serif;
  font-size: 32px; letter-spacing: -0.5px; margin-bottom: 4px;
}
.success-hora { font-size: 14px; color: var(--text2); margin-bottom: 1.25rem; }
.success-tiempo {
  background: var(--olive-light); color: var(--olive);
  padding: 12px 20px; border-radius: var(--r-sm);
  font-size: 16px; font-weight: 600; margin-bottom: 1rem;
}
.aviso-ojo {
  background: var(--red-light); color: var(--red);
  padding: 14px 20px; border-radius: var(--r-sm);
  font-size: 17px; font-weight: 700; margin-bottom: 1rem;
  border: 1px solid rgba(139,33,49,0.15);
}
.success-photo {
  width: 120px; height: 90px; object-fit: cover;
  border-radius: var(--r-sm); border: 1px solid var(--border);
  margin-bottom: 1rem;
}
.countdown-bar-wrap {
  width: 100%; max-width: 240px; height: 3px;
  background: var(--border); border-radius: 99px;
  margin-top: 1.5rem; overflow: hidden;
}
.countdown-bar {
  height: 100%; background: var(--olive);
  border-radius: 99px;
  transition: width linear;
}

/* ── ERROR ── */
.error-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; }
.error-msg { font-size: 14px; color: var(--red); }
.retry-btn {
  padding: 10px 24px; border-radius: var(--r-sm);
  background: var(--text); color: white; border: none;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="screen-loading" class="screen active">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Cargando...</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="screen">
    <div class="app-header">
      <div class="logo-wrap">
        <img src="logo_buenasysantas.jpg" alt="Logo">
      </div>
      <div class="header-text">
        <div class="app-title">Fichaje</div>
        <div class="app-date" id="header-date"></div>
      </div>
      <button class="sync-btn" id="sync-btn" onclick="syncSheets()" title="Actualizar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 019-9 9 9 0 016.36 2.64L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-9 9 9 9 0 01-6.36-2.64L3 16"/><path d="M3 21v-5h5"/>
        </svg>
      </button>
    </div>
    <div class="section-label">Selecciona empleado</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <!-- PIN -->
  <div id="screen-pin" class="screen">
    <button class="back-btn" onclick="showScreen('screen-main')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>
    <div class="pin-wrap">
      <div class="pin-avatar-lg" id="pin-avatar"></div>
      <div class="pin-name-lg" id="pin-name"></div>
      <div class="pin-hint">Introduce tu PIN de 4 dígitos</div>
      <div class="pin-dots">
        <div class="pin-dot" id="p0"></div>
        <div class="pin-dot" id="p1"></div>
        <div class="pin-dot" id="p2"></div>
        <div class="pin-dot" id="p3"></div>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="numpad">
        <button class="num-btn" onclick="addPin(1)">1</button>
        <button class="num-btn" onclick="addPin(2)">2</button>
        <button class="num-btn" onclick="addPin(3)">3</button>
        <button class="num-btn" onclick="addPin(4)">4</button>
        <button class="num-btn" onclick="addPin(5)">5</button>
        <button class="num-btn" onclick="addPin(6)">6</button>
        <button class="num-btn" onclick="addPin(7)">7</button>
        <button class="num-btn" onclick="addPin(8)">8</button>
        <button class="num-btn" onclick="addPin(9)">9</button>
        <button class="num-btn clr" onclick="clearPin()">C</button>
        <button class="num-btn" onclick="addPin(0)">0</button>
        <button class="num-btn del" onclick="deletePin()">⌫</button>
      </div>
    </div>
  </div>

  <!-- FICHAR -->
  <div id="screen-fichar" class="screen">
    <button class="back-btn" onclick="cancelarFichaje()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </button>

    <!-- Spinner mientras carga datos del empleado -->
    <div id="fichar-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;">
      <div class="spinner"></div>
      <div class="loading-text">Cargando fichajes...</div>
    </div>

    <!-- Contenido real (oculto hasta cargar) -->
    <div id="fichar-content" style="display:none; flex-direction:column; flex:1;">
      <div class="fich-name" id="fich-nombre"></div>
      <div id="fich-entrada-wrap" class="info-row" style="display:none;">
        <div class="info-chip chip-green">
          <div class="info-chip-label">Entrada</div>
          <div class="info-chip-value" id="fich-entrada-val"></div>
        </div>
        <div class="info-chip chip-gray">
          <div class="info-chip-label">Tiempo</div>
          <div class="info-chip-value" id="fich-tiempo-val">—</div>
        </div>
      </div>
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-off" id="cam-off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18.36 6.64A9 9 0 015.64 19.36M9.76 9.76A3 3 0 0014.24 14.24M12 3v1M12 20v1M3 12h1M20 12h1M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42"/></svg>
          Sin cámara
        </div>
      </div>
      <div class="action-btns">
        <button id="btn-entrada" class="btn-fichar btn-entrada" onclick="registrarFichaje('ENTRADA')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M14 12H3"/></svg>
          Registrar Entrada
        </button>
        <button id="btn-salida" class="btn-fichar btn-salida" onclick="registrarFichaje('SALIDA')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Registrar Salida
        </button>
      </div>
      <div class="hist-wrap">
        <div class="hist-title">Últimos fichajes</div>
        <div class="hist-list" id="fich-history"></div>
      </div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="screen-success" class="screen">
    <div class="success-wrap">
      <div class="success-icon" id="success-icon">✓</div>
      <div class="success-name" id="success-name"></div>
      <div class="success-hora" id="success-hora"></div>
      <div class="success-tiempo" id="success-tiempo" style="display:none;"></div>
      <div class="aviso-ojo" id="aviso-ojo" style="display:none;">⚠️ OJO HORARIO</div>
      <img id="success-photo" class="success-photo" src="" alt="" style="display:none;">
      <div class="countdown-bar-wrap">
        <div class="countdown-bar" id="countdown-bar" style="width:100%;"></div>
      </div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypMnnN4c7Wh8FQzFFrE9r_dxH2JlfhvwikBo7-iGks0KFegjEm0XAdWEymNmie4VlU/exec';

const state = {
  empleados: [],
  // fichajes solo se cargan fresh, nunca se usan datos viejos
  empleadoActual: null,
  pinIngresado: '',
  stream: null,
  tiempoInterval: null,
  countdownTimeout: null,
};

// ── Pantallas ────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Fecha header ─────────────────────────────────────────────────
function updateDate() {
  const el = document.getElementById('header-date');
  if (el) el.textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}
updateDate();
setInterval(updateDate, 60000);

// ── Utils ────────────────────────────────────────────────────────
function getInitials(n) {
  return n.trim().split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}
function primerNombre(n) { return n.trim().split(/\s+/)[0]; }
function fmtFecha(v) {
  if (!v) return '—';
  const s = String(v).trim();
  if (s.includes('/')) {
    const p = s.split('/');
    if (p.length === 3) return `${p[0].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[2]}`;
  }
  return s;
}
function fmtHora(v) {
  if (!v) return '—';
  return String(v).trim().substring(0, 5);
}
function horaAMin(h) {
  const s = String(h).trim().substring(0, 5).split(':');
  if (s.length < 2) return 0;
  return parseInt(s[0]) * 60 + parseInt(s[1]);
}
function diferenciaMin(e, s) {
  let em = horaAMin(e), sm = horaAMin(s);
  if (sm < em) sm += 24 * 60;
  return sm - em;
}
function diaLaboral(fecha, hora) {
  if (horaAMin(hora) < 120) {
    const p = String(fecha).trim().split('/');
    if (p.length === 3) {
      const d = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
      d.setDate(d.getDate() - 1);
      return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    }
  }
  return String(fecha).trim();
}
function minATexto(m) {
  if (!m || m <= 0) return '0h 0min';
  return `${Math.floor(m/60)}h ${m%60}min`;
}
function calcTiempo(fichaje) {
  try {
    const f = fmtFecha(fichaje.fecha), h = fmtHora(fichaje.hora);
    if (!f || !h || f === '—' || h === '—') return null;
    const fp = f.split('/'), hp = h.split(':');
    if (fp.length !== 3 || hp.length < 2) return null;
    const dt = new Date(parseInt(fp[2]), parseInt(fp[1])-1, parseInt(fp[0]), parseInt(hp[0]), parseInt(hp[1]), 0);
    const diff = Date.now() - dt.getTime();
    if (diff < 0) return null;
    const totalMin = Math.floor(diff / 60000);
    return `${Math.floor(totalMin/60)}h ${totalMin%60}min`;
  } catch { return null; }
}

// ── API ──────────────────────────────────────────────────────────
async function apiGet(params) {
  const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams(params).toString(), { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
async function apiPost(data) {
  const res = await fetch(SCRIPT_URL + '?action=addFichaje', {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── Cargar empleados (solo nombres, sin fichajes) ────────────────
async function cargarEmpleados() {
  const data = await apiGet({ action: 'getEmpleados' });
  state.empleados = data
    .map(r => ({
      nombre: r[0] || '',
      nss: r[1] || '',
      dni: r[2] || '',
      pin: (r[3] || '').toString().trim()
    }))
    .filter(e => e.nombre);
}

// ── Render empleados (sin estado trabajando/descansando hasta sync) ──
function renderEmpleados(fichajesMap) {
  const g = document.getElementById('emp-grid');
  if (!g) return;
  g.innerHTML = state.empleados.map((emp, i) => {
    const fichs = fichajesMap ? (fichajesMap[emp.nombre] || []) : null;
    const ultimo = fichs ? fichs[fichs.length - 1] : null;
    const working = ultimo && ultimo.tipo === 'ENTRADA';
    const hasData = fichs !== null;
    return `<div class="emp-card" onclick="seleccionarEmpleado(${i})" style="animation-delay:${i*0.04}s">
      <div class="emp-avatar ${working ? 'working' : ''}">${getInitials(emp.nombre)}</div>
      <div>
        <div class="emp-name">${primerNombre(emp.nombre)}</div>
        ${hasData
          ? `<span class="emp-status ${working ? 'status-working' : 'status-resting'}">
               <span class="status-dot ${working ? 'pulse' : ''}"></span>
               ${working ? 'Trabajando' : 'Descansando'}
             </span>`
          : `<span class="emp-status status-resting" style="opacity:0.4">—</span>`
        }
      </div>
    </div>`;
  }).join('');
}

// ── Sync completo (botón ↻): carga empleados + todos sus fichajes ──
let syncFichajesMap = null; // cache de la última sync completa

async function syncSheets() {
  const btn = document.getElementById('sync-btn');
  if (btn) btn.classList.add('spinning');
  try {
    await cargarEmpleados();
    const results = await Promise.all(
      state.empleados.map(async e => {
        try {
          const data = await apiGet({ action: 'getFichajes', nombre: e.nombre });
          return [e.nombre, Array.isArray(data) ? data.map(r => ({ fecha: r[0]||'', tipo: r[1]||'', hora: r[2]||'', foto: r[3]||'' })) : []];
        } catch { return [e.nombre, []]; }
      })
    );
    syncFichajesMap = Object.fromEntries(results);
    renderEmpleados(syncFichajesMap);
  } catch(e) { console.warn('Sync error:', e); }
  finally { if (btn) btn.classList.remove('spinning'); }
}

// ── Seleccionar empleado → PIN (sin cargar fichajes todavía) ─────
function seleccionarEmpleado(i) {
  state.empleadoActual = state.empleados[i];
  state.pinIngresado = '';
  document.getElementById('pin-name').textContent = state.empleadoActual.nombre;
  document.getElementById('pin-avatar').textContent = getInitials(state.empleadoActual.nombre);
  document.getElementById('pin-error').textContent = '';
  actualizarPinDots();
  showScreen('screen-pin');
}

// ── PIN ──────────────────────────────────────────────────────────
function addPin(n) {
  if (state.pinIngresado.length >= 4) return;
  state.pinIngresado += n.toString();
  actualizarPinDots();
  if (state.pinIngresado.length === 4) setTimeout(verificarPin, 130);
}
function deletePin() { state.pinIngresado = state.pinIngresado.slice(0,-1); actualizarPinDots(); }
function clearPin() { state.pinIngresado = ''; actualizarPinDots(); }
function actualizarPinDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('p' + i);
    if (d) d.className = 'pin-dot' + (i < state.pinIngresado.length ? ' filled' : '');
  }
}
function verificarPin() {
  if (state.pinIngresado === (state.empleadoActual.pin || '').toString().trim()) {
    mostrarPantallaFichaje();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Inténtalo de nuevo.';
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('p' + i);
      if (d) d.className = 'pin-dot error';
    }
    state.pinIngresado = '';
    setTimeout(() => { actualizarPinDots(); document.getElementById('pin-error').textContent = ''; }, 800);
  }
}

// ── Pantalla fichar: muestra loading, luego carga fresh data ─────
async function mostrarPantallaFichaje() {
  showScreen('screen-fichar');
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }

  // Mostrar spinner, ocultar contenido
  document.getElementById('fichar-loading').style.display = 'flex';
  document.getElementById('fichar-content').style.display = 'none';

  const emp = state.empleadoActual;
  document.getElementById('fich-nombre').textContent = primerNombre(emp.nombre);

  // Cargar fichajes FRESH (sin datos cacheados)
  let fichs = [];
  try {
    const data = await apiGet({ action: 'getFichajes', nombre: emp.nombre });
    fichs = Array.isArray(data) ? data.map(r => ({ fecha: r[0]||'', tipo: r[1]||'', hora: r[2]||'', foto: r[3]||'' })) : [];
  } catch(e) {
    console.warn('Error cargando fichajes:', e);
  }

  // Actualizar cache para el mapa de la pantalla principal
  if (syncFichajesMap) syncFichajesMap[emp.nombre] = fichs;

  // Ocultar spinner, mostrar contenido
  document.getElementById('fichar-loading').style.display = 'none';
  document.getElementById('fichar-content').style.display = 'flex';

  const ultimo = fichs[fichs.length - 1];
  const ultimoTipo = ultimo ? ultimo.tipo : null;
  const wrap = document.getElementById('fich-entrada-wrap');
  const btnE = document.getElementById('btn-entrada');
  const btnS = document.getElementById('btn-salida');

  if (ultimoTipo === 'ENTRADA') {
    wrap.style.display = 'grid';
    document.getElementById('fich-entrada-val').textContent = `${fmtFecha(ultimo.fecha)} · ${fmtHora(ultimo.hora)}`;
    function tick() {
      const t = calcTiempo(ultimo);
      document.getElementById('fich-tiempo-val').textContent = t || '—';
    }
    tick();
    state.tiempoInterval = setInterval(tick, 30000);
    btnE.className = 'btn-fichar btn-disabled'; btnE.onclick = null;
    btnS.className = 'btn-fichar btn-salida'; btnS.onclick = () => registrarFichaje('SALIDA');
  } else {
    wrap.style.display = 'none';
    btnE.className = 'btn-fichar btn-entrada'; btnE.onclick = () => registrarFichaje('ENTRADA');
    btnS.className = 'btn-fichar btn-disabled'; btnS.onclick = null;
  }

  // Historial
  const ultimos4 = fichs.slice(-4).reverse();
  document.getElementById('fich-history').innerHTML = ultimos4.length
    ? ultimos4.map(f => `<div class="hist-row">
        <span class="hist-type ${f.tipo === 'ENTRADA' ? 'e' : 's'}">${f.tipo}</span>
        <span class="hist-fecha">${fmtFecha(f.fecha)}</span>
        <span class="hist-hora">${fmtHora(f.hora)}</span>
      </div>`).join('')
    : '<div class="hist-row" style="color:var(--text2);">Sin fichajes anteriores</div>';

  // Cámara
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    document.getElementById('video').srcObject = state.stream;
    document.getElementById('cam-off').style.display = 'none';
  } catch {
    document.getElementById('cam-off').style.display = 'flex';
  }
}

function cancelarFichaje() {
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
  showScreen('screen-main');
}

function capturarFoto() {
  try {
    const v = document.getElementById('video'), c = document.getElementById('canvas');
    c.width = 320; c.height = 240;
    c.getContext('2d').drawImage(v, 0, 0, 320, 240);
    return c.toDataURL('image/jpeg', 0.65);
  } catch { return ''; }
}

async function registrarFichaje(tipo) {
  if (state.tiempoInterval) { clearInterval(state.tiempoInterval); state.tiempoInterval = null; }
  const emp = state.empleadoActual;
  const foto = capturarFoto();
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }

  const ahora = new Date();
  const fecha = `${String(ahora.getDate()).padStart(2,'0')}/${String(ahora.getMonth()+1).padStart(2,'0')}/${ahora.getFullYear()}`;
  const hora = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

  let tiempoTexto = null, horasTrabajadas = 0;
  let horasTurnoTexto = '', horasDiaTexto = '';

  const fichs = syncFichajesMap && syncFichajesMap[emp.nombre]
    ? syncFichajesMap[emp.nombre]
    : [];

  if (tipo === 'SALIDA') {
    const ultimaEntrada = [...fichs].reverse().find(f => f.tipo === 'ENTRADA');
    let minTurno = 0;
    if (ultimaEntrada) {
      minTurno = diferenciaMin(ultimaEntrada.hora, hora);
      const h = Math.floor(minTurno / 60), m = minTurno % 60;
      tiempoTexto = `Has trabajado ${h} horas y ${m} minutos`;
      horasTrabajadas = h;
      horasTurnoTexto = minATexto(minTurno);
    }
    const diaActual = diaLaboral(fecha, hora);
    let minDia = minTurno, i = fichs.length - 1;
    while (i >= 0) {
      if (fichs[i].tipo === 'SALIDA') {
        let j = i - 1;
        while (j >= 0 && fichs[j].tipo !== 'ENTRADA') j--;
        if (j >= 0 && diaLaboral(fichs[j].fecha, fichs[j].hora) === diaActual) {
          minDia += diferenciaMin(fichs[j].hora, fichs[i].hora); i = j - 1;
        } else break;
      } else i--;
    }
    horasDiaTexto = minATexto(minDia);
  }

  // Actualizar cache local
  if (syncFichajesMap) {
    if (!syncFichajesMap[emp.nombre]) syncFichajesMap[emp.nombre] = [];
    syncFichajesMap[emp.nombre].push({ fecha, tipo, hora, foto: foto ? 'si' : '' });
  }
  renderEmpleados(syncFichajesMap);

  // Enviar a sheets (sin bloquear UI)
  apiPost({ nombre: emp.nombre, fecha, tipo, hora, foto: foto ? 'si' : '', horasTurno: horasTurnoTexto, horasDia: horasDiaTexto })
    .catch(e => console.warn('Error guardando fichaje:', e));

  mostrarExito(tipo, hora, foto, tiempoTexto, horasTrabajadas);
}

function mostrarExito(tipo, hora, foto, tiempoTexto, horasTrabajadas) {
  const icon = document.getElementById('success-icon');
  icon.className = 'success-icon ' + (tipo === 'ENTRADA' ? 'icon-entrada' : 'icon-salida');
  icon.textContent = tipo === 'ENTRADA' ? '↗' : '↙';
  document.getElementById('success-name').textContent = primerNombre(state.empleadoActual.nombre);
  document.getElementById('success-hora').textContent = tipo === 'ENTRADA' ? `Entrada · ${hora}` : `Salida · ${hora}`;

  const tEl = document.getElementById('success-tiempo');
  if (tiempoTexto && tipo === 'SALIDA') { tEl.textContent = tiempoTexto; tEl.style.display = 'block'; }
  else { tEl.style.display = 'none'; }

  document.getElementById('aviso-ojo').style.display = (tipo === 'SALIDA' && horasTrabajadas >= 10) ? 'block' : 'none';

  const img = document.getElementById('success-photo');
  if (foto) { img.src = foto; img.style.display = 'block'; }
  else { img.style.display = 'none'; }

  showScreen('screen-success');

  // Countdown bar
  const bar = document.getElementById('countdown-bar');
  if (bar) {
    bar.style.transition = 'none';
    bar.style.width = '100%';
    setTimeout(() => {
      bar.style.transition = 'width 5s linear';
      bar.style.width = '0%';
    }, 50);
  }

  if (state.countdownTimeout) clearTimeout(state.countdownTimeout);
  state.countdownTimeout = setTimeout(() => showScreen('screen-main'), 5000);
}

// ── Init: carga rápida — solo empleados, sin fichajes ────────────
async function init() {
  try {
    await cargarEmpleados();
    // Mostrar empleados sin estado (más rápido)
    renderEmpleados(null);
    showScreen('screen-main');
    // Luego cargar fichajes en background para mostrar estado
    const results = await Promise.all(
      state.empleados.map(async e => {
        try {
          const data = await apiGet({ action: 'getFichajes', nombre: e.nombre });
          return [e.nombre, Array.isArray(data)
            ? data.map(r => ({ fecha: r[0]||'', tipo: r[1]||'', hora: r[2]||'', foto: r[3]||'' }))
            : []];
        } catch { return [e.nombre, []]; }
      })
    );
    syncFichajesMap = Object.fromEntries(results);
    renderEmpleados(syncFichajesMap);
  } catch(e) {
    document.getElementById('screen-loading').innerHTML = `
      <div class="error-wrap">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8b2131" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="error-msg">No se pudo conectar. Comprueba tu conexión.</div>
        <button class="retry-btn" onclick="init()">↻ Reintentar</button>
      </div>`;
    document.getElementById('screen-loading').classList.add('active');
  }
}

init();
</script>
